name: Maven Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checka ut koden
        uses: actions/checkout@v4

      - name: Installera Java och konfigurera Maven auth
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Rensa Maven cache
        run: rm -rf ~/.m2/repository/se/iths/christoffer/my-textformatter

      - name: Bygg projektet
        run: mvn -B clean package
        env:
          GITHUB_TOKEN: ${{ secrets.LIBRARY_TOKEN }}

      - name: Publicera till GitHub Packages
        run: mvn deploy -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.LIBRARY_TOKEN }}